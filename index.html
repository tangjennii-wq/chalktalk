      {name:"KDIGO 2024 CKD Evaluation & Management",year:2024,access:"Open (CC BY-NC-ND)",url:"https://kdigo.org/guidelines/ckd-evaluation-and-management/",keys:"Teach CKD as a risk-stratification problem, not a staging chart. Dual biomarkers (eGFRcr-cys and ACR) together outperform creatinine alone. The therapeutic backbone for proteinuric CKD is now layered: a RASi to reduce intraglomerular pressure, an SGLT2 inhibitor for tubuloglomerular feedback restoration (supported by DAPA-CKD and EMPA-KIDNEY), and finerenone as a nonsteroidal MRA to blunt mineralocorticoid-driven fibrosis in diabetic kidney disease (FIDELIO-DKD, FIGARO-DKD). GLP-1 RA added for T2DM-CKD based on FLOW. Statins per SHARP in adults with CKD. KFRE is the tool for individualized progression risk."},
      {name:"KDIGO 2024 CKD-MBD",year:2024,access:"Open",keys:"Frame this as a phosphorus-PTH-FGF23 axis problem. Dietary phosphate first, binders second, with vitamin D analogs and calcimimetics reserved for severe or refractory secondary hyperparathyroidism. PTH targets in dialysis are a range (2-9× upper normal), not a number. Aluminum binders are historical and should be avoided."},

      {name:"2025 ACC/AHA ACS",year:2025,access:"Open",url:"https://www.ahajournals.org/doi/10.1161/CIR.0000000000001309",keys:"Think of ACS as a spectrum of plaque instability, not two diseases. The 2025 unified STEMI/NSTEMI framework reflects this. Early invasive strategy wins for high-risk NSTEMI because the problem is ongoing thrombosis; DAPT duration is individualized by balancing ischemic vs bleeding risk. Newer wrinkles worth knowing: P2Y12 de-escalation strategies and colchicine as anti-inflammatory secondary prevention (COLCOT, LoDoCo2)."},

      {name:"2022 AHA/ACC/HFSA Heart Failure",year:2022,access:"Open",keys:"HFrEF therapy is now a four-mechanism stack that should be started together, not sequentially: neurohormonal blockade (ARNi > ACEi/ARB), sympathetic blockade (beta-blocker), aldosterone blockade (MRA), and tubuloglomerular feedback modulation (SGLT2i). The point is synergy — each one treats a different maladaptive loop. Early initiation, rapid titration. HFpEF was historically orphaned, but SGLT2i finally moved the needle (EMPEROR-Preserved, DELIVER). IV iron helps iron-deficient patients regardless of anemia (AFFIRM-AHF). ICD/CRT decisions follow standard EF and QRS criteria."},

      {name:"GOLD 2025 COPD",year:2025,access:"Open (goldcopd.org)",keys:"COPD is a heterogeneous disease lumped by airflow limitation, so treatment logic works best when you think about the dominant driver. Inhaler escalation follows symptom burden and exacerbation history: bronchodilator monotherapy (LABA or LAMA) for symptoms, dual bronchodilation when that's inadequate, and add ICS when there's an eosinophilic signal (eos ≥300) because that predicts steroid response. Triple therapy helps frequent exacerbators (ETHOS, IMPACT). Roflumilast and azithromycin are niche add-ons. Smoking cessation is still the only intervention that changes the natural history of the disease."},

      {name:"ACG 2021 IBD (Crohn's, UC)",year:2021,access:"Open",keys:"Think of IBD as a cytokine-driven immune dysregulation problem, which is why targeted biologics work and why choosing between them depends on mechanism and disease phenotype. Anti-TNF agents (infliximab, adalimumab) are the workhorses for moderate-severe disease. Vedolizumab is gut-selective via α4β7 integrin blockade. Ustekinumab targets IL-12/23. JAK inhibitors (tofacitinib) are oral options for UC. Therapeutic drug monitoring optimizes efficacy because immunogenicity and pharmacokinetics vary widely. Surgery remains part of the algorithm for refractory disease or complications, not a failure."},
      {name:"ACG 2024 Alcohol-Associated Liver Disease",year:2024,access:"Open",keys:"The central tension in severe alcoholic hepatitis is that steroids help short-term mortality but add infection risk, so patient selection matters. MELD >20 or Maddrey DF ≥32 defines severe disease where prednisolone is considered. Lille score at day 7 tells you whether steroids are working — if not, stop. Early liver transplant for selected non-responders is increasingly accepted. The cornerstone remains abstinence, which means integrated treatment of the underlying alcohol use disorder, not just hepatology follow-up."},

      {name:"ADA/EASD 2022 T2DM Hyperglycemia Management",year:2022,access:"Open",keys:"Reframes diabetes management as cardiorenal-metabolic-first rather than glucose-first. The hierarchy: pick agents by comorbidity (SGLT2i for HF/CKD, GLP-1 RA for ASCVD or obesity), weight-positive drugs like sulfonylureas get deprioritized, and when insulin is needed, add a GLP-1 RA before escalating to basal-bolus."},
      {name:"2024 ATA Thyroid Nodules",year:2024,access:"Open",keys:"The workflow is ultrasound-based risk stratification (TI-RADS or ATA categories) to decide which nodules get FNA, because size alone misses biology. Cytology gets reported via Bethesda categories, and indeterminate results can be refined by molecular testing. A newer development worth knowing: active surveillance is an accepted option for low-risk papillary microcarcinoma, reflecting recognition that many are indolent."},
      {name:"Endocrine Society 2016 Adrenal Insufficiency",year:2016,access:"Open",keys:"Replace what's missing: hydrocortisone for cortisol, fludrocortisone for aldosterone in primary disease. Physiologic replacement is 15-25 mg/day split through the day. The life-threatening issue is stress dosing — patients need to know to double or triple their dose for illness and need IV hydrocortisone for major surgery or adrenal crisis. Medic-alert bracelets matter. Diagnosis hinges on cosyntropin stimulation with a cortisol <18 threshold."}
    ],

  "ID": {
    society: "IDSA (Infectious Diseases Society of America)",
    guidelines: [
      {name:"ATS/IDSA 2019 CAP (+2025 update)",year:2019,access:"Open",keys:"The framework is site of care and severity driving empiric therapy. Outpatient healthy adults can take amoxicillin or doxycycline; outpatients with comorbidities need broader coverage. Inpatients get a β-lactam plus a macrolide, or a respiratory fluoroquinolone alone. See Pulmonary section for the 2025 update's push toward shorter courses."},
      {name:"IDSA 2016 HAP/VAP",year:2016,access:"Open",keys:"Empiric therapy logic is driven by risk factors for resistant organisms: all HAP/VAP patients need anti-pseudomonal coverage, and MRSA coverage (vancomycin or linezolid) is added based on local resistance rates and patient risk factors. Seven-day courses are adequate for most patients — the prior dogma of 14+ days was overtreatment. De-escalate aggressively once cultures return. Double anti-pseudomonal coverage at initiation is only justified in specific high-risk scenarios."},
      {name:"IDSA 2018 C. difficile",year:2018,access:"Open",keys:"See GI section for the core treatment framework. IDSA aligns with ACG on fidaxomicin preferred."},
      {name:"IDSA 2023 HIV Primary Care",year:2023,access:"Open",keys:"The paradigm shifts worth knowing: integrase inhibitor-based ART for essentially everyone (bictegravir/TAF/FTC or dolutegravir regimens), same-day or rapid ART initiation at diagnosis, and the U=U principle (undetectable viral load means sexually untransmittable). PrEP has expanded beyond daily oral TDF/FTC to include TAF/FTC and long-acting injectable cabotegravir (PURPOSE trials). Opportunistic infection prophylaxis is still driven by CD4 thresholds."},
      {name:"AHA/IDSA 2023 Infective Endocarditis",year:2023,access:"Open",keys:"Diagnosis remains the modified Duke criteria, with the 2023 update adding PET/CT as a major imaging criterion. The process is old-school clinical: three sets of blood cultures before antibiotics, echocardiography to find vegetations, empiric vancomycin plus ceftriaxone or anti-staph β-lactam until speciation. Surgical indications are heart failure from valve destruction, uncontrolled infection, and high embolic risk. POET trial showed IV-to-PO antibiotic switch is feasible in stabilized left-sided endocarditis — a significant practice shift."},
      {name:"IDSA/ATS 2024 TB",year:2024,access:"Open",keys:"Standard RIPE therapy remains the backbone: two months of rifampin, isoniazid, pyrazinamide, and ethambutol, followed by four months of rifampin and isoniazid. Latent TB has shorter regimen options (3HP — once-weekly rifapentine + INH for 12 weeks, or 4 months of rifampin). Liver function monitoring is essential because hepatotoxicity is the dominant adverse effect."},
      {name:"SSC 2021 Sepsis/Septic Shock",year:2021,access:"Open",keys:"The hour-1 bundle exists because early antibiotics and source control change survival: lactate, cultures before antibiotics (if it won't delay them), broad-spectrum coverage, crystalloid resuscitation for hypotension, and vasopressors for MAP targets. Norepinephrine is first-line because of balanced α and β effects with less tachycardia than alternatives. Hydrocortisone has a role in refractory shock. The evolving nuance is backing off the rigid 30 mL/kg bolus in patients with heart failure and letting dynamic measures guide fluid responsiveness."}
    ],

  "Heme/Onc": {
    society: "ASH (American Society of Hematology) / ASCO / NCCN",
    guidelines: [
      {name:"ASH 2020 VTE Treatment",year:2020,access:"Open",keys:"The DOAC era means apixaban and rivaroxaban have largely displaced warfarin for provoked and unprovoked VTE because they don't require monitoring and have favorable safety profiles. Cancer-associated thrombosis was historically LMWH territory, but edoxaban and rivaroxaban now have data for most patients (Hokusai-VTE Cancer, SELECT-D), with a caveat about GI/GU bleeding risk in luminal malignancies. Duration logic: provoked VTE gets 3 months, unprovoked disease deserves reassessment at 3 months with extended therapy considered. HIT requires non-heparin alternatives (argatroban or bivalirudin) before transitioning to a DOAC."},
      {name:"NCCN Guidelines",year:2026,access:"License-restricted; free registration at nccn.org",keys:"NCCN publishes disease-specific oncology guidelines under a restricted license. Refer users to nccn.org directly for current recommendations; do not summarize NCCN content here."},
      {name:"ASCO Supportive Care",year:2024,access:"Open",keys:"Antiemetics are chosen by emetogenic risk of the regimen — highly emetogenic therapy needs a four-drug combination (NK1 antagonist, 5-HT3 antagonist, dexamethasone, olanzapine), and olanzapine has emerged as a key addition. G-CSF primary prophylaxis is reserved for regimens with high febrile neutropenia risk. The oncologic emergencies worth drilling residents on: tumor lysis syndrome (rasburicase when appropriate, aggressive hydration), SVC syndrome (imaging, steroids, radiation or stenting), malignant cord compression (steroids, radiation, surgery), and hypercalcemia (IV fluids, zoledronic acid, denosumab)."},
      {name:"ASH 2024 Sickle Cell",year:2024,access:"Open",keys:"Hydroxyurea is disease-modifying and should be offered to essentially everyone, including children, because it raises fetal hemoglobin and reduces vaso-occlusive crises. Newer disease-modifying agents each target a different piece of the pathophysiology: L-glutamine reduces oxidative stress, crizanlizumab blocks P-selectin-mediated adhesion, voxelotor stabilizes oxygenated hemoglobin. Gene therapies (exagamglogene, lovotibeglogene) have become approved options for severe disease. Acute chest and primary stroke prevention remain transfusion-based."},
      {name:"ASH 2018 ITP",year:2018,access:"Open",keys:"First-line is glucocorticoids (dexamethasone pulses or prednisone) to blunt autoimmune platelet destruction. For refractory disease, the options target different mechanisms: TPO receptor agonists (eltrombopag, romiplostim) increase production, rituximab depletes the B cells making antibody, splenectomy removes the major site of antibody-coated platelet clearance. Fostamatinib is a Syk inhibitor for multiply-refractory cases. Urgent bleeding needs IVIG or anti-D for rapid platelet rises."}
    ],
    conferences: ["ASH Annual Meeting (Dec)","ASCO Annual Meeting (Jun)","EHA Congress (Jun)","ISTH Congress","ASH Highlights/Hematology"],
    trials: ["Hokusai-VTE Cancer","SELECT-D","CATCH","CASSINI","CLOT"]

  "Rheumatology": {
    society: "ACR (American College of Rheumatology) / EULAR",
    guidelines: [
      {name:"ACR 2021 RA",year:2021,access:"Open",keys:"RA management is driven by the treat-to-target philosophy: aim for remission or low disease activity, measured objectively, and escalate if you don't hit it. Methotrexate remains the anchor drug because it's effective, cheap, and has decades of data. When MTX is inadequate, the choice between biologic DMARDs (anti-TNF, abatacept, tocilizumab) and JAK inhibitors (tofacitinib, upadacitinib, baricitinib) is increasingly informed by safety — the JAKi class carries a boxed warning for VTE, MACE, and malignancy in patients over 65 based on ORAL Surveillance, which has shifted prescribing. Glucocorticoids are for bridging, not maintenance."},
      {name:"ACR/EULAR 2019 SLE",year:2019,access:"Open",keys:"Hydroxychloroquine is foundational for every lupus patient because it reduces flares, damage accrual, and mortality, with the tradeoff of mandatory retinal screening. The newer biologics target specific pathways: belimumab blocks BAFF-mediated B cell survival, anifrolumab blocks type I interferon signaling. Lupus nephritis is managed per the KDIGO glomerulonephritis guideline. The modern philosophy is aggressive glucocorticoid minimization — target ≤5 mg/day — because cumulative steroid exposure drives organ damage. Anti-dsDNA and complement levels track disease activity in many patients."},
      {name:"ACR 2020 Gout",year:2020,access:"Open",keys:"Gout is a disease of uric acid supersaturation, so the definitive treatment is lowering urate below the saturation point, which means a target <6 mg/dL. Allopurinol is first-line urate-lowering therapy, started low and titrated up to target. Febuxostat is an alternative for allopurinol-intolerant patients, but CARES showed a cardiovascular safety signal. Acute flares are managed with colchicine, NSAIDs, or steroids; IL-1 blockade (anakinra) is reserved for refractory flares. Pegloticase is for severe tophaceous disease refractory to standard urate-lowering."},
      {name:"ACR/VF 2021 ANCA Vasculitis",year:2021,access:"Open",keys:"ANCA vasculitis is pauci-immune — the injury comes from neutrophil activation, not immune complexes — which is why B-cell depletion works. Induction therapy is rituximab (RAVE) or cyclophosphamide plus high-dose glucocorticoids. Avacopan, a C5a receptor antagonist, is glucocorticoid-sparing and based on ADVOCATE. Maintenance with rituximab beats azathioprine (MAINRITSAN). Plasma exchange was once dogma for severe renal disease, but PEXIVAS showed less benefit than expected, shifting practice away from routine use."},
      {name:"ACR 2024 ILD Screening in SARD",year:2024,access:"Open",keys:"Interstitial lung disease is a common cause of mortality in systemic autoimmune rheumatic diseases (scleroderma, myositis, RA, MCTD), so the 2024 recommendation is systematic screening rather than waiting for symptoms. HRCT establishes diagnosis, PFTs follow progression. Treatment stratifies by whether the disease is stable or progressive fibrosing: mycophenolate is a workhorse for active inflammation, nintedanib (an antifibrotic) is added for progressive fibrosing ILD based on INBUILD."}
    ],
    conferences: ["ACR Convergence (Nov)","EULAR Congress (Jun)"],
    trials: ["RAVE","ADVOCATE","MAINRITSAN","PEXIVAS","ORAL Surveillance","CARES","SLS-II","INBUILD"]

  "Neurology": {
    society: "AAN (American Academy of Neurology) / AHA/ASA (stroke)",
    guidelines: [
      {name:"2024 AHA/ASA Stroke",year:2024,access:"Open",keys:"Acute ischemic stroke management is a race against time because neurons die at a rate of ~2 million per minute of untreated LVO. IV thrombolysis with alteplase (or tenecteplase increasingly) within 4.5 hours is the backbone based on NINDS and ECASS-III, with tight BP control pre-lysis (<185/110). The expansion of the thrombectomy window to 24 hours for large vessel occlusion based on DAWN and DEFUSE 3 — using perfusion imaging to identify salvageable penumbra — is one of the biggest practice changes in neurology. Minor stroke and high-risk TIA get 21 days of dual antiplatelet therapy (CHANCE, POINT) then monotherapy. Statins are secondary prevention."},
      {name:"AAN 2022 Epilepsy",year:2022,access:"Open",keys:"Seizure classification (focal vs generalized) drives drug choice because mechanism matters. Levetiracetam, lamotrigine, and oxcarbazepine are first-line for focal seizures; valproate and levetiracetam cover generalized seizures. Status epilepticus is a stepwise escalation: benzodiazepines first, then fosphenytoin, levetiracetam, or valproate, then anesthetic infusions for refractory disease. Specialty epilepsies have specific answers — cannabidiol for Dravet and Lennox-Gastaut, cenobamate for refractory focal epilepsy."},
      {name:"AAN 2021 Myasthenia Gravis",year:2021,access:"Open",keys:"MG is an antibody-mediated disease of the neuromuscular junction, so therapy targets the antibodies and the downstream signaling. Symptomatic relief comes from acetylcholinesterase inhibition (pyridostigmine). Immunosuppression with steroids plus a steroid-sparing agent (azathioprine, mycophenolate) is the long-term backbone. Refractory disease has exciting new options targeting complement (eculizumab, ravulizumab) and FcRn (efgartigimod), which clears pathogenic IgG. Thymectomy is indicated for thymoma and for anti-AChR+ generalized MG based on MGTX. Crisis means intubate if needed and rapid immunotherapy with IVIG or plasma exchange."},
      {name:"AAN 2019 Headache",year:2019,access:"Open",keys:"Migraine pathophysiology centers on the CGRP pathway, which explains why the newer drugs work. For acute treatment, triptans remain first-line, with gepants (ubrogepant, rimegepant) as CGRP-targeted oral alternatives. Prevention has traditional options (topiramate, valproate, propranolol, amitriptyline), but the monoclonal antibodies against CGRP or its receptor (erenumab, fremanezumab, galcanezumab) have transformed care for refractory migraine. OnabotulinumtoxinA is approved specifically for chronic migraine."}
    ],
    conferences: ["AAN Annual Meeting (Apr)","International Stroke Conference (Feb)","AES Annual Meeting (Dec)","ECTRIMS (MS, Sep-Oct)"],
    trials: ["DAWN","DEFUSE 3","CHANCE","POINT","MGTX","NINDS tPA"]

  "Critical Care": {
    society: "SCCM (Society of Critical Care Medicine)",
    guidelines: [
      {name:"SSC 2021 Sepsis & Septic Shock",year:2021,access:"Open",keys:"Core principles: early antibiotics, source control, and perfusion support, with increasing attention to not over-resuscitating. Balanced crystalloids (lactated Ringer's or Plasma-Lyte) are preferred over normal saline because the hyperchloremic acidosis from saline worsens kidney outcomes (SMART, BaSICS). Vasopressor choice follows mechanism: norepinephrine first for its balanced α/β effects, vasopressin added next to spare catecholamine dose, and inotropes (epinephrine or dobutamine) when cardiac dysfunction is the problem. Hydrocortisone 200 mg/day IV for shock that remains refractory. Dynamic measures of fluid responsiveness (passive leg raise, pulse pressure variation) have largely displaced static measures like CVP."},
      {name:"ATS/ESICM 2024 ARDS",year:2024,access:"Open",keys:"ARDS is diffuse alveolar injury causing shunt physiology, and the interventions that change mortality all target minimizing ventilator-induced lung injury. Low tidal volume ventilation (6 mL/kg ideal body weight) is the foundational ARDSNet finding. Prone positioning for moderate-severe ARDS (P/F <150) recruits dependent lung and reduces mortality (PROSEVA). Conservative fluid management improves outcomes once shock resolves (FACTT). Neuromuscular blockade is nuanced — ACURASYS showed benefit, ROSE did not, so use is selective. Dexamethasone has data for moderate-severe disease (DEXA-ARDS, CoDEX). ECMO is a rescue for refractory hypoxemia (EOLIA)."},
      {name:"PADIS 2018 Pain/Agitation/Delirium",year:2018,access:"Open",keys:"The philosophy shift is away from deep sedation and toward an awake, comfortable, oriented patient whenever possible. Treat pain first, because untreated pain drives agitation. Target light sedation (RASS 0 to -1). Propofol and dexmedetomidine are preferred over benzodiazepines because benzos independently increase delirium risk. Screen for delirium with CAM-ICU, because untreated delirium worsens outcomes. Early mobilization, sleep-wake cycle preservation, and family presence help. Antipsychotics have a limited role and don't prevent delirium (MIND-USA)."}
    ],
    conferences: ["SCCM Critical Care Congress (Jan-Feb)","ESICM LIVES (Oct)","ATS (pulm/crit, May)","CHEST (Oct)"],

  "Allergy/Immuno": {
    society: "AAAAI/ACAAI (American Academy & American College of Allergy, Asthma & Immunology) / JCAAI",
    guidelines: [
      {name:"WAO 2020 Anaphylaxis",year:2020,access:"Open",keys:"Anaphylaxis is a time-sensitive mast cell and basophil degranulation event, and epinephrine reverses every mechanism: it's a bronchodilator, vasoconstrictor, inotrope, and it stabilizes mast cells. IM into the anterolateral thigh is the route because absorption is fast and reliable — IV is reserved for cardiac arrest because bolus dosing risks arrhythmia. Repeat every 5-15 minutes as needed. Adjuncts (H1/H2 blockers, glucocorticoids, bronchodilators) don't replace epinephrine and don't reliably prevent biphasic reactions despite old dogma. Observation 4-6 hours, then discharge with an auto-injector and allergy referral."},
      {name:"Joint Task Force 2023 Drug Allergy",year:2023,access:"Open",keys:"The penicillin allergy label is wildly overreported — fewer than 1% of patients with a self-reported penicillin allergy have true IgE-mediated allergy on testing, and the label drives worse outcomes because patients get second-line antibiotics. Delabeling has become a quality initiative: low-risk histories can go directly to oral challenge, moderate-risk histories get skin testing first. Cross-reactivity with cephalosporins is much lower than the old 10% number — it's under 2% with modern cephalosporins. Desensitization is available when a specific drug is unavoidable."},
      {name:"Joint Task Force 2024 Chronic Urticaria",year:2024,access:"Open",keys:"Chronic urticaria is usually mast cell-driven rather than truly allergic. Second-generation H1 antihistamines are first-line and can be up-titrated to four times standard dose before adding a different agent. Omalizumab (anti-IgE) is the go-to add-on for refractory disease. Cyclosporine is a third-line option. Systemic steroids should be avoided for maintenance because the disease is chronic and steroid burden accumulates."},
      {name:"AAAAI 2023 Primary Immunodeficiency",year:2023,access:"Open",keys:"Suspect PID in patients with recurrent sinopulmonary infections, unusual opportunistic infections, or autoimmunity that doesn't fit an obvious pattern. Initial workup is straightforward and cheap: CBC with differential, quantitative immunoglobulins, and specific vaccine responses. Antibody deficiencies are treated with IVIG or subcutaneous Ig replacement. Referral to clinical immunology for further characterization and treatment planning."}
    ],
    conferences: ["AAAAI Annual Meeting (Mar)","ACAAI Annual Meeting (Nov)","EAACI Congress (Jun)"],
    trials: ["BAT","Omalizumab CSU trials"]

  "Dermatology": {
    society: "AAD (American Academy of Dermatology)",
    guidelines: [
      {name:"AAD 2024 Atopic Dermatitis",year:2024,access:"Open",keys:"Atopic dermatitis is a barrier defect plus Th2-skewed inflammation, which explains why both skin care and immunomodulation matter. Emollients are the foundation. Topical corticosteroids treat flares; topical calcineurin inhibitors and crisaborole are steroid-sparing alternatives for sensitive areas. Moderate-severe disease unresponsive to topicals is now treated with targeted biologics: dupilumab blocks IL-4/13 signaling, tralokinumab blocks IL-13, and JAK inhibitors (topical ruxolitinib, oral upadacitinib and abrocitinib) are newer options. Wet wraps help with severe flares."},
      {name:"AAD 2023 Psoriasis",year:2023,access:"Open",keys:"Psoriasis is a Th17-axis driven disease, and the biologic revolution has reshaped treatment by targeting specific cytokines. Limited disease gets topicals, moderate disease can try phototherapy, and moderate-severe disease goes to biologics chosen by cytokine target: TNF inhibitors, IL-17 blockers (secukinumab, ixekizumab, brodalumab), IL-23 blockers (guselkumab, risankizumab, tildrakizumab), and IL-12/23 (ustekinumab). Oral apremilast is a PDE4 inhibitor. Methotrexate and cyclosporine are legacy options when biologics aren't accessible."},
      {name:"AAD 2019 Acne",year:2019,access:"Open",keys:"The four drivers of acne are sebum, hyperkeratinization, Cutibacterium acnes, and inflammation, and effective regimens target multiple mechanisms. Mild acne gets topical retinoid plus benzoyl peroxide. Moderate acne adds topical or oral antibiotics. Severe nodulocystic disease warrants isotretinoin (through the iPLEDGE program given teratogenicity). Hormonal therapy (OCPs, spironolactone) targets androgen-driven sebum in women. The principle to avoid: antibiotic monotherapy, because it drives resistance."},
      {name:"SJS/TEN management (consensus)",year:2023,access:"Open",keys:"SJS/TEN is a T-cell mediated, drug-induced cytotoxic reaction that's dermatologic but clinically a burn-unit problem. Immediate withdrawal of the culprit drug is the single most important action, and delays worsen outcomes. Supportive care drives survival: fluid resuscitation, wound care, temperature regulation, nutrition, ophthalmologic monitoring to prevent scarring. Immunomodulation with cyclosporine or etanercept has some mortality benefit in observational data but remains controversial. SCORTEN gives prognosis at presentation."}
    ],

    trials: ["LIBERTY-AD","UNCOVER","VOYAGE","ECZTRA"]

  "Psychiatry": {
    society: "APA (American Psychiatric Association)",
    guidelines: [
      {name:"APA 2022 Major Depressive Disorder",year:2022,access:"Open",keys:"Depression treatment is driven by severity, prior response, and tolerability rather than strong evidence that one antidepressant class beats another. SSRIs and SNRIs are first-line because they're effective and reasonably well-tolerated. Partial response gets augmentation with bupropion, mirtazapine, or an atypical antipsychotic rather than simply swapping drugs. Treatment-resistant depression now has esketamine (intranasal, NMDA modulation) as an approved option, and ECT remains the most effective treatment for severe, psychotic, or refractory disease. Psychotherapy (CBT, IPT) is equally effective for mild-to-moderate disease. Suicide screening is integral (PHQ-9 item 9 at minimum)."},
      {name:"APA 2009 Bipolar Disorder (update pending)",year:2009,access:"Open",keys:"Bipolar disorder treatment splits by phase. Acute mania responds to lithium, valproate, or atypical antipsychotics, often in combination. Bipolar depression is trickier — it responds to specific atypical antipsychotics (lurasidone, quetiapine, lumateperone, cariprazine) rather than standard antidepressants. Antidepressant monotherapy is avoided because of manic switch risk. Lithium remains the maintenance gold standard for relapse prevention and has antisuicide properties. Psychoeducation and adherence focus are non-pharmacologic cornerstones."},
      {name:"ASAM 2020 Opioid Use Disorder",year:2020,access:"Open",keys:"OUD is a chronic disease, and medications for opioid use disorder (MOUD) reduce mortality. The three FDA-approved agents work via different mechanisms: buprenorphine is a partial agonist with a ceiling effect on respiratory depression and can be prescribed in office-based settings, methadone is a full agonist requiring opioid treatment program dispensing, and extended-release naltrexone is an antagonist that blocks effects but requires full detoxification first. Naloxone co-prescription for overdose reversal should be routine. Language matters — avoid stigmatizing terms that create barriers to care."},
      {name:"ASAM 2020 Alcohol Use Disorder",year:2020,access:"Open",keys:"AUD is underdiagnosed and undertreated despite effective pharmacotherapy. Naltrexone (oral or long-acting IM) reduces heavy drinking days, and acamprosate helps maintain abstinence; both are first-line. Disulfiram is reserved for highly motivated patients because it requires daily adherence. Off-label options include topiramate and gabapentin. Withdrawal management is benzodiazepine-based, CIWA-guided, with thiamine given before glucose to prevent Wernicke's encephalopathy. Behavioral therapy integration improves outcomes."},
      {name:"APA 2010 Anxiety/Panic",year:2010,access:"Open",keys:"SSRIs and SNRIs are first-line because they target the serotonergic dysregulation underlying most anxiety disorders, though they take weeks to work. CBT is equally effective and doesn't carry medication side effects. Benzodiazepines provide rapid relief but should be short-term because of dependence risk, and are avoided in the elderly and in patients with substance use history. Buspirone is a slower-onset option for GAD without dependence liability. Beta-blockers have a niche for performance anxiety."}
    ],
    conferences: ["APA Annual Meeting (May)","Psych Congress (Oct)"],
    trials: ["STAR*D","CATIE","STEP-BD"]
  },
  "Geriatrics": {
    society: "AGS (American Geriatrics Society)",
    guidelines: [
      {name:"AGS Beers Criteria 2023",year:2023,access:"Open",keys:"The Beers concept is that older adults have altered pharmacokinetics and increased sensitivity, so some medications cause more harm than benefit. The categories worth knowing rather than memorizing: anticholinergics cause cognitive impairment and falls, long-acting benzodiazepines accumulate and increase fracture risk, chronic NSAID use harms kidneys and GI, sliding-scale insulin is ineffective and causes hypoglycemia, and chronic PPI use without indication has mounting downsides. Some drugs are use-with-caution rather than avoid — SSRIs because of hyponatremia and fall risk. The criteria are a starting point for deprescribing conversations, not a rigid prohibition list."},
      {name:"AGS/BGS 2022 Falls Prevention",year:2022,access:"Open",keys:"Falls are multifactorial, so assessment should be too. A faller needs a structured evaluation looking at strength, balance, vision, medications, orthostatics, footwear, and home environment. Interventions with the best evidence are exercise-based — Otago and tai chi build the strength and balance that prevent future falls. Vitamin D supplementation helps in deficient patients. Medication review, especially psychotropics, is high-yield because many contributing drugs are modifiable. Home safety and vision correction round out the approach."},
      {name:"AGS 2019 Delirium Prevention",year:2019,access:"Open",keys:"Delirium is preventable more than treatable, which is why multicomponent non-pharmacologic protocols like HELP work. The ingredients are orientation, sleep-wake normalization, mobility, sensory aids (vision and hearing), and hydration. Avoid Beers-listed drugs in hospitalized elders. Work through reversible causes using mnemonics like PINCH ME (Pain, Infection, Nutrition, Constipation, Hydration, Medications, Environment). Antipsychotics are reserved for severe agitation or safety concerns, not routine treatment or prevention."}
    ],
    conferences: ["AGS Annual Scientific Meeting (May)","GSA Annual Scientific Meeting (Nov)"],
    trials: ["HELP","STOP-IT (delirium)","Otago"]
  },
  "Women's Health": {
    society: "ACOG (American College of Obstetricians and Gynecologists) / NAMS",
    guidelines: [
      {name:"USPSTF 2024 Breast Cancer Screening",year:2024,access:"Open",keys:"The 2024 update lowered the starting age for biennial mammography from 50 to 40 based on rising breast cancer incidence in younger women and improved risk-benefit calculation. Screening runs through 74, with individualized decisions after 75. Dense breasts (BI-RADS C/D) are a risk modifier, and MRI is added for patients with high lifetime risk from BRCA or similar mutations. Risk assessment drives prevention decisions — chemoprevention with tamoxifen, raloxifene, or aromatase inhibitors has a role in high-risk women."},
      {name:"USPSTF 2018 Cervical Cancer Screening",year:2018,access:"Open",keys:"Screening is stratified by age and test type because HPV biology changes across the lifespan. Women 21-29 get cytology every three years. From 30-65, HPV testing or co-testing every five years is preferred because HPV primary testing is more sensitive for precancerous lesions. Screening stops at 65 if prior screening has been adequate. HPV vaccination has expanded through age 45 based on later-catch-up data."},
      {name:"NAMS 2022 Menopause/HRT",year:2022,access:"Open",keys:"The modern HRT paradigm rejects the blanket avoidance that followed WHI and recognizes benefit for symptomatic women under 60 or within 10 years of menopause. The key principles: estrogen plus progestin for women with a uterus (to protect endometrium), transdermal routes have lower VTE risk than oral, and vaginal estrogen is safe even in patients with contraindications to systemic therapy because absorption is minimal. Non-hormonal options include SSRIs, gabapentin, and the newer NK3 receptor antagonist fezolinetant for vasomotor symptoms."},
      {name:"USPSTF 2023 Hypertension in Pregnancy",year:2023,access:"Open",keys:"Hypertensive disorders of pregnancy cause major maternal and fetal morbidity, and prevention has become a priority. Low-dose aspirin (81 mg) starting at 12 weeks reduces preeclampsia in high-risk pregnancies. BP monitoring throughout pregnancy is standard. Severe hypertension (≥160/110) is a medical emergency requiring prompt treatment with IV labetalol, oral nifedipine, or hydralazine. Magnesium sulfate is given for seizure prophylaxis in severe preeclampsia and for eclampsia treatment."}
    ],
    conferences: ["ACOG Annual Clinical & Scientific Meeting (May)","NAMS Annual Meeting (Sep-Oct)"],
    trials: ["WHI","KEEPS","ELITE"]
  },
  "Oncology": {
    society: "ASCO (American Society of Clinical Oncology) / NCCN",
    guidelines: [
      {name:"NCCN Guidelines",year:2026,access:"License-restricted; free registration at nccn.org",keys:"NCCN publishes disease-specific oncology guidelines under a restricted license. Refer users to nccn.org directly for current recommendations; do not summarize NCCN content here."},
      {name:"ASCO 2023 Lung Cancer",year:2023,access:"Open",keys:"NSCLC has been transformed by molecular profiling — comprehensive testing for EGFR, ALK, ROS1, BRAF, KRAS G12C, NTRK, MET, RET, HER2, and PD-L1 should be standard for all advanced disease because targeted therapy dramatically outperforms chemotherapy when a driver is present. Non-targetable disease is treated with immunotherapy (anti-PD-1/PD-L1) with or without chemotherapy depending on PD-L1 expression. SCLC remains chemoradiation-sensitive with platinum-etoposide, and the addition of atezolizumab or durvalumab has modestly improved survival."},
      {name:"USPSTF 2021 Lung Cancer Screening",year:2021,access:"Open",keys:"Lung cancer screening with low-dose CT is one of the few cancer screens with demonstrated mortality benefit in a defined risk group. The 2021 update broadened eligibility to adults 50-80 with a 20 pack-year smoking history who currently smoke or quit within 15 years. The underlying reasoning is that early detection produces real stage shift in a high-prevalence population. Shared decision-making matters because of false positives and incidental findings."},
      {name:"USPSTF 2021 Colorectal Cancer Screening",year:2021,access:"Open",keys:"The screening start age dropped from 50 to 45 because colorectal cancer incidence in younger adults has been rising for reasons that are not fully understood. Multiple equivalent options exist depending on patient preference: colonoscopy every 10 years is the most sensitive and covers both screening and polyp removal, FIT annually is non-invasive and inexpensive, stool DNA-FIT every 1-3 years, CT colonography, or flexible sigmoidoscopy. Screening continues to 75 and is individualized after that."},
      {name:"ASCO 2024 Cancer-Associated VTE",year:2024,access:"Open",keys:"Cancer patients have a hypercoagulable state from tumor-related procoagulants and treatment effects, and VTE is a common complication. DOACs (apixaban, edoxaban, rivaroxaban) have largely replaced LMWH as first-line for most patients because of convenience, but caution is warranted in luminal GI or GU malignancies where bleeding risk is elevated. Treatment duration extends as long as cancer is active. Primary thromboprophylaxis is reserved for ambulatory patients with high Khorana scores."},
      {name:"ASCO 2023 Antiemetics",year:2023,access:"Open",keys:"Antiemetic regimens are scaled to the emetogenic risk of the chemotherapy. Highly emetogenic regimens require four-drug combinations targeting multiple receptors: an NK1 receptor antagonist, a 5-HT3 antagonist, dexamethasone, and olanzapine. Olanzapine's emergence as a key component was a significant practice change because it hits dopamine, histamine, and serotonin pathways simultaneously. Moderate emetogenic risk uses a simpler regimen. Breakthrough nausea management is clinically important and often under-addressed."}

    trials: ["KEYNOTE","CheckMate","FLAURA","ALEX","CROWN","DESTINY-Breast","CheckMate 9LA"]

  "Prevention": {
    society: "USPSTF (US Preventive Services Task Force) / ACIP",
    guidelines: [
      {name:"USPSTF Recommendations (Live)",year:2026,access:"Open (uspreventiveservicestaskforce.org)",keys:"USPSTF recommendations are graded by strength of evidence and magnitude of benefit: A and B grades mean recommend offering the service, C means individualize, D means recommend against, and I means insufficient evidence. The grading is deliberately conservative and evidence-based, which is why USPSTF sometimes disagrees with specialty societies. High-yield adult preventive services to know: BP screening for all adults, lipid screening in the 40-75 range for CV risk calculation, diabetes screening in overweight adults 35-70, one-time AAA ultrasound for men 65-75 who ever smoked, osteoporosis screening in women 65 and older, and routine screening for depression, alcohol misuse, and tobacco use."},
      {name:"ACIP Adult Immunizations 2026",year:2026,access:"Open (CDC)",keys:"Adult immunization has become more age-stratified and risk-based than the old one-size-fits-all schedule. The core annual vaccines are influenza and updated COVID-19. Tdap once then Td or Tdap every 10 years. Recombinant zoster (Shingrix) is a two-dose series starting at 50 and has largely replaced the older live vaccine. Pneumococcal schedules have simplified with PCV20 as a single-dose option. RSV vaccination is now recommended for adults 75 and older and for 60-74 with risk factors. HPV catch-up vaccination runs through age 26 with shared decision-making up to 45. Hepatitis B is now recommended for all adults 19-59."},
      {name:"USPSTF 2022 Aspirin Primary Prevention",year:2022,access:"Open",keys:"The 2022 update substantially narrowed aspirin's role in primary prevention because bleeding risk often outweighs cardiovascular benefit. For adults 60 and older, routine aspirin is no longer recommended for primary prevention. For 40-59 year olds with a calculated 10-year ASCVD risk of 10% or higher, the decision should be individualized weighing bleeding risk. Patients already on aspirin without clear indication should have the decision revisited, especially as they age. Secondary prevention for established cardiovascular disease is unchanged."},
      {name:"USPSTF 2023 Statin Primary Prevention",year:2023,access:"Open",keys:"Statin primary prevention requires both elevated cardiovascular risk and a risk-benefit favorable enough to warrant lifelong therapy. The B-grade recommendation is statin initiation for adults 40-75 with at least one cardiovascular risk factor and a calculated 10-year ASCVD risk of 10% or higher. For the 7.5-10% risk range, the recommendation is weaker (grade C) and individualized. Patients 76 and older shouldn't have statins newly initiated because the evidence base is insufficient."}

      {name:"AAHPM Hospice Eligibility",year:2023,access:"Open",keys:"Hospice eligibility under the Medicare benefit requires a prognosis of six months or less if the disease runs its usual course, and the patient forgoes curative treatment for the qualifying terminal illness. Disease-specific criteria exist for common trajectories: cancer (performance status and disease progression), advanced dementia (FAST staging), heart failure (NYHA IV with optimized therapy), COPD, end-stage liver disease, and end-stage renal disease. Prognostication is imperfect, and patients who live longer than six months can be recertified. The benefit covers comprehensive interdisciplinary care including medications, equipment, nursing visits, and 13 months of bereavement support for the family."}

function getGuidelinesForTopic(topic) {
  if (!topic) return null;
  var t = topic.toLowerCase();
  var matched = [];
  // map topic keywords to specialties
  var kwMap = {
    "Nephrology": ["kidney","renal","nephro","ckd","aki","gfr","dialysis","transplant","glomerul","nephrotic","nephritic","proteinuria","creatinine","urine","sodium","hyponatremia","hypernatremia","potassium","hyperkalemia","acid-base","rta","metabolic acidosis","metabolic alkalosis","diuretic","furst","siadh","beer potomania","rhabdomyolysis","tumor lysis","hepatorenal","crrt","ihd","peritoneal","fistula","raas","sglt2","finerenone","aldosteronism"],
    "Cardiovascular": ["heart","cardiac","cardio","hf ","hfref","hfpef","acs","stemi","nstemi","atrial fib","af ","afib","valve","valvular","endocarditis","syncope","hypertension","htn","blood pressure","dyslipidemia","cholesterol","statin","anticoagul","warfarin","doac","chads"],
    "Pulmonary": ["copd","asthma","lung","pulmonary","pneumonia","cap ","hap ","vap","ards","pleural","pe ","pulmonary embolism","ild","ipf","pulmonary hypertension","oxygen","ventilat","intubat","bronch"],
    "GI/Hepatology": ["liver","hepat","cirrhosis","varices","ascites","nafld","masld","nash","mash","gi bleed","ibd","crohn","colitis","c diff","cdiff","pancreat","gi ","gastro","esophag","celiac","barrett"],
    "Endocrinology": ["diabet","dka","hhs","insulin","a1c","thyroid","hypothyroid","hyperthyroid","adrenal","cortisol","addison","cushing","pheochrom","calcium","hypercalcemia","pth","osteoporosis","pituitary","prolactin"],
    "ID": ["infect","sepsis","septic","hiv","aids","antibiotic","meningitis","tuberculosis","tb ","ripe","mrsa","vre","uti","endocarditis","pneumonia","fever","neutropenic"],
    "Heme/Onc": ["anemia","iron","b12","folate","sickle","thalassemia","ttp","hus","dic","platelet","thrombocytopenia","hit","dvt","vte","anticoagul","lymphoma","leukemia","myeloma","oncolog","cancer","malignancy","febrile neutropenia"],
    "Rheumatology": ["rheumat","arthritis","lupus","sle","gout","vasculitis","anca","scleroderma","myositis","antiphospholipid","dmard","biologic","autoimmune"],
    "Neurology": ["stroke","tpa","thrombectomy","seizure","epilepsy","headache","migraine","guillain","myasthenia","ms ","multiple sclerosis","neuropathy","parkinson","dementia"],
    "Critical Care": ["icu","critical care","ventilat","ards","sepsis","septic shock","vasopressor","norepinephrine","intubat","prone","sedation","delirium","rass","crrt"],
    "Allergy/Immuno": ["anaphylax","allerg","drug allergy","penicillin allergy","urticaria","angioedema","immunodefic","ivig","hereditary angioedema","mast cell"],
    "Dermatology": ["psoriasis","atopic dermatitis","eczema","sjs","tens","stevens","cellulit","erysipelas","melanoma","skin cancer","acne","pemphig","rash","dermatitis"],
    "Psychiatry": ["depress","anxiety","bipolar","schizophren","substance use","alcohol use","opioid use","mat ","buprenorphine","naltrexone","methadone","ssri","snri","ect","suicide","mania"],
    "Geriatrics": ["geriatr","elderly","frail","fall","beers","polypharmacy","dementia","alzheimer","delirium","pressure injury","decubitus","goals of care","advance directive","frailty"],
    "Women's Health": ["contracept","menopaus","hrt","menstrua","pregnan","cervical cancer","breast cancer screen","ocp","preeclamp","postpartum","gestational"],
    "Oncology": ["cancer","tumor","oncolog","malignan","chemo","immunotherapy","metastasis","metastatic","carcinoma","lymphoma","leukemia","myeloma","sarcoma","lung cancer","breast cancer","colorectal","prostate cancer"],
    "Prevention": ["screen","prevention","uspstf","vaccin","immuniz","aspirin primary","statin primary","cancer screen","cardiovascular risk","tobacco cessation"],
    "Palliative": ["palliat","hospice","end of life","cancer pain","opioid titration","goals of care","comfort care","dnr","dni"]
  };
  for (var spec in kwMap) {
    var kws = kwMap[spec];
    for (var ki = 0; ki < kws.length; ki++) {
      if (t.indexOf(kws[ki]) >= 0 && matched.indexOf(spec) < 0) {
        matched.push(spec);
        break;
      }
    }
  }
  if (matched.length === 0) {
    // try category match from TOPICS structure
    for (var cat in TOPICS) {
      var subs = TOPICS[cat].topics;
      for (var sub in subs) {
        for (var ti = 0; ti < subs[sub].length; ti++) {
          if (subs[sub][ti] === topic) {
            var cleanCat = cat.replace(/★\s*/,"").replace(/\s*\(\d+%.*\)/,"").trim();
            if (cleanCat === "★ Nephrology" || cleanCat === "Nephrology" || cat.indexOf("Nephrology") >= 0) matched.push("Nephrology");
            else if (cat.indexOf("Cardiovascular") >= 0) matched.push("Cardiovascular");
            else if (cat.indexOf("Pulmonary") >= 0) matched.push("Pulmonary");
            else if (cat.indexOf("GI") >= 0) matched.push("GI/Hepatology");
            else if (cat.indexOf("Endocrin") >= 0) matched.push("Endocrinology");
            else if (cat.indexOf("ID") >= 0) matched.push("ID");
            else if (cat.indexOf("Hematology") >= 0) matched.push("Heme/Onc");
            else if (cat.indexOf("Oncology") >= 0) matched.push("Oncology");
            else if (cat.indexOf("Heme") >= 0) matched.push("Heme/Onc");
            else if (cat.indexOf("Rheum") >= 0) matched.push("Rheumatology");
            else if (cat.indexOf("Neuro") >= 0) matched.push("Neurology");
            else if (cat.indexOf("Allergy") >= 0) matched.push("Allergy/Immuno");
            else if (cat.indexOf("Dermatology") >= 0) matched.push("Dermatology");
            else if (cat.indexOf("Psychiatry") >= 0) matched.push("Psychiatry");
            else if (cat.indexOf("Geriatric") >= 0) matched.push("Geriatrics");
            else if (cat.indexOf("Women") >= 0) matched.push("Women's Health");
            else if (cat.indexOf("Prevention") >= 0) matched.push("Prevention");
            else if (cat.indexOf("Critical Care") >= 0) matched.push("Critical Care");
            else if (cat.indexOf("Palliative") >= 0) matched.push("Palliative");
          }
        }
      }
    }
  }
  if (matched.length === 0) return null;
  var result = { specialties: matched, context: "", sources: [], trials: [], conferences: [] };
  for (var mi = 0; mi < matched.length; mi++) {
    var g = GUIDELINES[matched[mi]];
    if (!g) continue;
    result.context += "\n\n[" + g.society + " Guidelines]\n";
    for (var gi = 0; gi < g.guidelines.length; gi++) {
      var gl = g.guidelines[gi];
      result.context += "• " + gl.name + " (" + gl.year + ", " + gl.access + "): " + gl.keys + "\n";
      result.sources.push(gl.name + " (" + gl.year + ")");
    }
    result.trials = result.trials.concat(g.trials || []);
    result.conferences = result.conferences.concat(g.conferences || []);
  }
  return result;
}

function importLibraryJSON(file){
  var r=new FileReader();
  r.onload=function(){try{
    var data=JSON.parse(r.result);
    var incoming=Array.isArray(data)?data:(data.talks||[data]);
    var arr=loadSavedTalks();
    var existingIds={};arr.forEach(function(e){existingIds[e.id]=true});
    var added=0;
    incoming.forEach(function(e){
      if(!e.id)e.id="t_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
      if(!existingIds[e.id]&&e.talk){arr.unshift(e);added++}

    writeSavedTalks(arr);alert("Imported "+added+" talk"+(added===1?"":"s")+".");render();
  }catch(err){alert("Could not parse JSON file: "+err.message)}};
  r.readAsText(file);
}

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function stripCitations(str) {
  if (typeof str !== "string") return str;
  return str
    .replace(/]*>/g, "")
    .replace(/<\/antml:cite>/g, "")
    .replace(/<cite[^>]*>/g, "")
    .replace(/<\/cite>/g, "")
    .replace(/\[\d+(?:[-,:]\d+)*\]/g, "")  // also strip bracket citations like [1] [2-3]
    .trim();
}

function deepCleanCitations(obj) {
  if (typeof obj === "string") return stripCitations(obj);
  if (Array.isArray(obj)) return obj.map(deepCleanCitations);
  if (obj && typeof obj === "object") {
    var out = {};
    for (var k in obj) out[k] = deepCleanCitations(obj[k]);
    return out;
  }
  return obj;
}

function fixJSON(raw) {
  // Strip web search citation tags that leak into output
  var t = raw.replace(/]*>/g,"").replace(/<\/antml:cite>/g,"").replace(/<cite[^>]*>/g,"").replace(/<\/cite>/g,"");
  t = t.replace(/```json/g,"").replace(/```/g,"").trim();
  try { return JSON.parse(t), t; } catch(e) {}
  if (!t.endsWith("}")) { var idx = t.lastIndexOf("}"); if (idx > 0) t = t.substring(0, idx + 1); }
  try { return JSON.parse(t), t; } catch(e) {}
  var tryPoints = [];
  for (var i = t.length - 1; i > t.length * 0.3; i--) {
    if (t[i]==="}"||t[i]==="]"||t[i]==='"') tryPoints.push(i);
  }
  for (var p = 0; p < tryPoints.length && p < 40; p++) {
    var attempt = t.substring(0, tryPoints[p] + 1).replace(/,\s*$/,"");
    var ob=(attempt.match(/{/g)||[]).length-(attempt.match(/}/g)||[]).length;
    var sb=(attempt.match(/\[/g)||[]).length-(attempt.match(/\]/g)||[]).length;
    for(var k=0;k<sb;k++) attempt+="]";
    for(var k2=0;k2<ob;k2++) attempt+="}";
    ob=(attempt.match(/{/g)||[]).length-(attempt.match(/}/g)||[]).length;
    for(var k3=0;k3<ob;k3++) attempt+="}";
    try { return JSON.parse(attempt), attempt; } catch(e2) {}
  }
  return t;
}

function wrapText(text,max){if(!text||text.length<=max)return[text||""];var w=text.split(" "),l=[],c="";for(var i=0;i<w.length;i++){if((c+" "+w[i]).trim().length>max&&c){l.push(c.trim());c=w[i]}else c=(c+" "+w[i]).trim()}if(c)l.push(c.trim());return l.slice(0,3)}

function autoLayout(nodes,arrows){
  var inc={};for(var i=0;i<arrows.length;i++)inc[arrows[i].to]=true;
  var root=null;
  for(var i2=0;i2<nodes.length;i2++){if(nodes[i2].type==="title"){root=nodes[i2].id;break}}
  if(!root){for(var i3=0;i3<nodes.length;i3++){if(!inc[nodes[i3].id]){root=nodes[i3].id;break}}}
  if(!root)root=nodes[0].id;
  var ch={};for(var i4=0;i4<nodes.length;i4++)ch[nodes[i4].id]=[];
  for(var i5=0;i5<arrows.length;i5++){if(ch[arrows[i5].from])ch[arrows[i5].from].push(arrows[i5].to)}
  var layers={},vis={},q=[{id:root,layer:0}];vis[root]=true;
  while(q.length>0){var cur=q.shift();if(!layers[cur.layer])layers[cur.layer]=[];layers[cur.layer].push(cur.id);var c2=ch[cur.id]||[];for(var ci=0;ci<c2.length;ci++){if(!vis[c2[ci]]){vis[c2[ci]]=true;q.push({id:c2[ci],layer:cur.layer+1})}}}
  for(var i6=0;i6<nodes.length;i6++){if(!vis[nodes[i6].id]){var ml=Object.keys(layers).length;if(!layers[ml])layers[ml]=[];layers[ml].push(nodes[i6].id)}}
  var tl=Object.keys(layers).length;
  var lk=Object.keys(layers).sort(function(a,b){return parseInt(a)-parseInt(b)});
  for(var li=0;li<lk.length;li++){var layer=parseInt(lk[li]);var items=layers[lk[li]];for(var ii=0;ii<items.length;ii++){var ni=nodes.findIndex(function(n){return n.id===items[ii]});if(ni>=0){nodes[ni].x=items.length===1?0.5:0.12+(ii/(items.length-1))*0.76;nodes[ni].y=tl===1?0.5:0.08+(layer/Math.max(tl-1,1))*0.84}}}
}

async function callAPI(sys, content, maxTok, opts) {
  opts = opts || {};
  var key = getClaudeKey();
  if (!key) throw new Error("Anthropic API key required. Reload and try again.");
  var body = {
    model: opts.model || MODEL,
    max_tokens: maxTok,
    system: sys,
    messages: [{role:"user", content: content}]
  };
  if (opts.tools) body.tools = opts.tools;
  var r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  if(!r.ok){var e={};try{e=await r.json()}catch(x){}
    if(r.status===401||r.status===403){localStorage.removeItem("claude_api_key");throw new Error("Invalid API key (cleared). Click Generate to re-enter.")}
    throw new Error(e.error?.message||"API "+r.status)}
  var d=await r.json();var txt="";for(var i=0;i<(d.content||[]).length;i++){if(d.content[i].type==="text")txt+=d.content[i].text}return txt;
}

async function generate(){
  if(!S.topic.trim()||S.loading)return;
  S.loading=true;S.error="";S.loadSec=0;S.loadMsg="Reasoning through physiology...";S.talk=null;S.sec=0;S.dg=null;S.dgErr="";S.podScript="";S.podPlaying=false;S.podShow=false;S.showAns=false;S.userPick="";S.critiqueStatus="idle";S.critiqueResult=null;S.critiqueShow=false;speechSynthesis.cancel();render();
  loadTimer=setInterval(function(){S.loadSec++;var msgs=S.wantWebSearch?["Reasoning through physiology...","Searching current literature...","Cross-referencing societies...","Building content...","Peer reviewing...","Polishing final version..."]:["Reasoning through physiology...","Loading guidelines...","Building content...","Peer reviewing & polishing..."];S.loadMsg=msgs[Math.min(Math.floor(S.loadSec/3),msgs.length-1)];render()},1000);
  try{
    var glRef = getGuidelinesForTopic(S.topic);
    var guidelineContext = "";
    if (glRef) {
      guidelineContext = "\n\n═══ GUIDELINE REFERENCE CONTEXT (use this to anchor your recommendations) ═══" + glRef.context;
      if (glRef.trials.length > 0) guidelineContext += "\nLandmark trials to cite when relevant: " + glRef.trials.join(", ");
      guidelineContext += "\n═══ END GUIDELINE CONTEXT ═══";
    }
    var searchHint = S.wantWebSearch
      ? '\nUse web_search to verify the most current society guidance from high-quality sources only (society guideline pages, NEJM, JAMA, Lancet, PubMed) before writing. CRITICAL: Do NOT include any citation markup, XML tags, <cite> tags,  tags, or footnote markers in your output. The JSON values must be plain text only. If you want to attribute a fact, write it inline like "per KDIGO 2024" or "(EMPA-KIDNEY trial)" — never use XML/HTML tags.'
      : '\nRely on your training and the GUIDELINE REFERENCE CONTEXT above. Do not search the web.';
    var uc=[{type:"text",text:'Create content on: "'+S.topic+'"' + guidelineContext + searchHint + '\nONLY JSON. Plain text values, no XML tags, no citation markup.'}];
    var sys=S.style==="boards"?BOARDS_PROMPT:LECTURE_PROMPT;

    // Step 1: Main generation (Sonnet, max 4096 tokens, web search only if user opted in)
    var mainOpts = {model:MODEL_MAIN};
    if (S.wantWebSearch) mainOpts.tools = [{type:"web_search_20250305",name:"web_search",max_uses:3}];
    var txt=await callAPI(sys,uc,4096,mainOpts);
    if(!txt.trim())throw new Error("Empty response");
    var draftTalk=JSON.parse(fixJSON(txt));
    draftTalk = deepCleanCitations(draftTalk);

    // Step 2: Combined critique-and-fix in a single Haiku call
    // If clean, returns {"verdict":"clean"}; if issues, returns the corrected JSON in same schema as draft
    var critiqueSystem = "You are a senior board-certified Internal Medicine attending acting as a peer reviewer for a chalk talk. Review for: (1) factual errors in physiology or pharmacology, (2) outdated treatment recommendations vs current major society guidelines (KDIGO/AHA/ACC/ATS/ACG/AASLD/ADA/IDSA/ASH/ASCO/ACR/AAN/SCCM/AAAAI/AAD/APA/AGS/ACOG/USPSTF/AAHPM), (3) internal contradictions, (4) wrong landmark trial attributions, (5) shallow physiology. Do NOT flag stylistic preferences.\n\nReturn ONLY ONE of these two JSON formats (no other text):\n\nIF the talk is accurate and needs no changes:\n{\"verdict\":\"clean\"}\n\nIF you find substantive accuracy issues, return the FULL corrected chalk talk in the EXACT same JSON schema as the draft, with all your fixes applied. Do NOT include a verdict field in this case — just return the corrected talk JSON directly.";
    var critiqueInput = "Topic: " + S.topic + "\n\nDraft chalk talk to review:\n" + JSON.stringify(draftTalk);

    var finalTalk = draftTalk;
    try {
      var critTxt = await callAPI(critiqueSystem, critiqueInput, 4096, {model:MODEL_CRITIC});
      if (critTxt && critTxt.trim()) {
        var parsed = JSON.parse(fixJSON(critTxt));
        parsed = deepCleanCitations(parsed);
        // If verdict is "clean", keep draft. Otherwise the parsed object IS the corrected talk.
        if (parsed.verdict === "clean") {
          finalTalk = draftTalk;
        } else if (parsed.title || parsed.question) {
          // Looks like a corrected talk (has expected schema fields)
          finalTalk = parsed;
        }
      }
    } catch(critErr) {
      // If critique fails, fall back to original draft silently
      console.warn("Critique failed, using draft:", critErr.message);
    }

    S.talk = finalTalk;
    S.sec=0;S.dg=null;S.dgErr="";S.podScript="";
    if (glRef) { S.glRef = glRef; } else { S.glRef = null; }
  }catch(e){S.error=e.message}
  clearInterval(loadTimer);S.loading=false;render();
  if(S.talk&&S.wantPod)genPodcast();
}

  for(var i=0;i<dg.nodes.length;i++){var n=dg.nodes[i];var nx=Math.max(0,Math.min(1,n.x!=null?n.x:0.5));var ny=Math.max(0,Math.min(1,n.y!=null?n.y:0.5));pos[n.id]={px:P+nx*(W-P*2),py:P+ny*(H-P*2),label:n.label||"",type:n.type||"box"}}
  var C={title:{f:"#330662",s:"#ab82c5",t:"#fff",z:15},accent:{f:"rgba(112,43,157,.3)",s:"#702b9d",t:"#eee6f3",z:12},formula:{f:"rgba(43,80,157,.25)",s:"#5a8acd",t:"#a0c4ff",z:12},warning:{f:"rgba(200,60,60,.2)",s:"#c85050",t:"#ffb0b0",z:12},box:{f:"rgba(255,255,255,.1)",s:"rgba(200,196,212,.5)",t:"#e8e6f0",z:12}};
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;font-family:system-ui,sans-serif"><defs><marker id="da" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="rgba(171,130,197,.8)"/></marker></defs>';
  var arrs=dg.arrows||[];
  for(var ai=0;ai<arrs.length;ai++){var a=arrs[ai],fr=pos[a.from],to=pos[a.to];if(!fr||!to)continue;var dx=to.px-fr.px,dy=to.py-fr.py,d=Math.sqrt(dx*dx+dy*dy);if(d<5)continue;var ux=dx/d,uy=dy/d;var x1=fr.px+ux*40,y1=fr.py+uy*28,x2=to.px-ux*40,y2=to.py-uy*28,mx=(x1+x2)/2,my=(y1+y2)/2;svg+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="rgba(171,130,197,.6)" stroke-width="2" marker-end="url(#da)"/>';if(a.label)svg+='<rect x="'+(mx-a.label.length*3.5-6)+'" y="'+(my-10)+'" width="'+(a.label.length*7+12)+'" height="20" rx="4" fill="#2d2a3e" stroke="rgba(171,130,197,.4)"/><text x="'+mx+'" y="'+(my+4)+'" text-anchor="middle" fill="#ab82c5" font-size="10">'+esc(a.label)+'</text>'}
  for(var ni=0;ni<dg.nodes.length;ni++){var nd=dg.nodes[ni],p=pos[nd.id],lb=p.label,ln=wrapText(lb,nd.type==="title"?22:16),c=C[p.type]||C.box;var bw=Math.max(lb.length*(nd.type==="title"?9.5:7.5),90)+28,bh=(nd.type==="title"?42:34)+(ln.length-1)*18;svg+='<rect x="'+(p.px-bw/2)+'" y="'+(p.py-bh/2)+'" width="'+bw+'" height="'+bh+'" rx="'+(nd.type==="title"?10:8)+'" fill="'+c.f+'" stroke="'+c.s+'" stroke-width="'+(nd.type==="title"?2.5:1.5)+'"'+(nd.type==="formula"?' stroke-dasharray="5,3"':"")+"/>";for(var tl=0;tl<ln.length;tl++)svg+='<text x="'+p.px+'" y="'+(p.py+6+tl*18-(ln.length-1)*9)+'" text-anchor="middle" fill="'+c.t+'" font-size="'+c.z+'" font-weight="'+(nd.type==="title"?700:500)+'">'+esc(ln[tl])+"</text>"}
  return svg+"</svg>";
}

  h+='<input id="savedSearchIn" value="'+esc(S.savedSearch)+'" placeholder="Search your saved talks..." style="width:100%;background:#fff;border:1.5px solid #e2dfe8;border-radius:12px;padding:12px 16px;font-size:14px;outline:none;margin-bottom:16px">';

    h+='<div style="background:#fff;border:1px dashed #d0cce0;border-radius:12px;padding:40px 20px;text-align:center;color:#9490a6"><div style="font-size:42px;margin-bottom:10px">\uD83D\uDCD6</div><div style="font-size:14px;font-weight:600;color:#6b6780;margin-bottom:6px">'+(all.length===0?"No saved talks yet":"No matches")+'</div><div style="font-size:12px">'+(all.length===0?"Generate a chalk talk and click \u2605 Save to add it here.":"Try a different search term.")+'</div></div>';

  document.querySelectorAll(".loadTalkBtn").forEach(function(b){b.onclick=function(){loadSavedTalk(b.dataset.id)}});
  document.querySelectorAll(".exportTalkBtn").forEach(function(b){b.onclick=function(){exportTalkJSON(b.dataset.id)}});

  document.querySelectorAll(".catBtn").forEach(function(b){b.onclick=function(){S.expCat=S.expCat===b.dataset.cat?null:b.dataset.cat;S.expSub=null;render()}});
  document.querySelectorAll(".subBtn").forEach(function(b){b.onclick=function(){S.expSub=S.expSub===b.dataset.sub?null:b.dataset.sub;render()}});
  document.querySelectorAll(".topBtn").forEach(function(b){b.onclick=function(){S.topic=b.dataset.t;S.showLib=false;render()}});
}

function bindMain(){
  var ta=document.getElementById("topicTA");if(ta)ta.oninput=function(e){S.topic=e.target.value;var gb2=document.getElementById("genBtn");if(gb2){gb2.disabled=S.loading||!S.topic.trim();gb2.style.opacity=S.loading||!S.topic.trim()?"0.4":"1"}};
  var bb=document.getElementById("browseBtn");if(bb)bb.onclick=function(){S.showLib=true;S.expCat="\u2605 Nephrology";render()};
  var ci=document.getElementById("chatInput");if(ci){ci.oninput=function(e){S.chatIn=e.target.value;var csB=document.getElementById("chatSend");if(csB){var act=!S.chatBusy&&S.chatIn.trim();csB.style.background=act?"linear-gradient(135deg,#702b9d,#330662)":"#c9c3d6";csB.style.boxShadow=act?"0 2px 10px rgba(112,43,157,0.45)":"none";csB.style.cursor=act?"pointer":"not-allowed"}};ci.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();sendChat()}}}
  var cs=document.getElementById("chatSend");if(cs)cs.onclick=sendChat;
  document.querySelectorAll(".styleBtn").forEach(function(b){b.onclick=function(){if(S.style!==b.dataset.s){S.style=b.dataset.s;S.talk=null;S.sec=0;S.dg=null;S.dgErr="";S.podScript="";S.podPlaying=false;S.podShow=false;S.showAns=false;S.userPick="";S.error="";speechSynthesis.cancel()}render()}});
  var dz=document.getElementById("dropZone");if(dz)dz.onclick=function(){document.getElementById("fileInput").click()};
  var fi=document.getElementById("fileInput");if(fi)fi.onchange=async function(e){
    for(var i=0;i<e.target.files.length;i++){var f=e.target.files[i];try{
      if(f.type.indexOf("text")>=0||f.name.endsWith(".txt")){var r=new FileReader();r.onload=function(){S.files.push({n:f.name,t:"text",c:r.result.slice(0,8000)});render()};r.readAsText(f)}
      else if(f.type==="application/pdf"||f.type.indexOf("image/")===0){var r2=new FileReader();r2.onload=function(){S.files.push({n:f.name,t:f.type==="application/pdf"?"pdf":"img",c:r2.result.split(",")[1],m:f.type});render()};r2.readAsDataURL(f)}
    }catch(err){}}};
  document.querySelectorAll(".rmFile").forEach(function(b){b.onclick=function(){S.files.splice(+b.dataset.i,1);render()}});
  var pc=document.getElementById("podCheck");if(pc)pc.onchange=function(e){S.wantPod=e.target.checked};
  var wc=document.getElementById("webCheck");if(wc)wc.onchange=function(e){S.wantWebSearch=e.target.checked};
  var gb=document.getElementById("genBtn");if(gb)gb.onclick=generate;
  var rb=document.getElementById("resetBtn");if(rb)rb.onclick=resetAll;
  document.querySelectorAll(".secBtn").forEach(function(b){b.onclick=function(){S.sec=+b.dataset.i;render()}});
  var db=document.getElementById("dgBtn");if(db)db.onclick=genDiagram;
  document.querySelectorAll(".dgModeBtn").forEach(function(b){b.onclick=function(){if(S.dgMode!==b.dataset.m){S.dgMode=b.dataset.m;S.dg=null;S.dgErr="";render()}}});
  var rk=document.getElementById("resetKey");if(rk)rk.onclick=function(e){e.preventDefault();localStorage.removeItem("gemini_api_key");S.dgErr="API key cleared. Click Generate Visual to re-enter.";render()};
  var rck=document.getElementById("resetClaudeKey");if(rck)rck.onclick=function(){localStorage.removeItem("claude_api_key");var nk=prompt("Enter your Anthropic API key:\n\nGet one at: https://console.anthropic.com/settings/keys");if(nk&&nk.trim())localStorage.setItem("claude_api_key",nk.trim());render()};
  document.querySelectorAll(".choiceBtn").forEach(function(b){b.onclick=function(){if(!S.showAns){S.userPick=b.dataset.letter;render()}}});
  var sb=document.getElementById("submitAnsBtn");if(sb)sb.onclick=function(){S.showAns=true;render()};
  var ft=document.getElementById("feedbackToggle");if(ft)ft.onclick=function(){S.showFeedback=true;render()};
  var fta=document.getElementById("feedbackTA");if(fta)fta.oninput=function(e){S.feedbackText=e.target.value;var fsb=document.getElementById("feedbackSubmit");if(fsb)fsb.style.opacity=S.feedbackText.trim()?"1":"0.4"};
  var fs=document.getElementById("feedbackSubmit");if(fs)fs.onclick=submitFeedback;
  var fc=document.getElementById("feedbackCancel");if(fc)fc.onclick=function(){S.showFeedback=false;S.feedbackText="";render()};
  var pg=document.getElementById("podGenBtn");if(pg)pg.onclick=genPodcast;
  var pp=document.getElementById("podPlayBtn");if(pp)pp.onclick=playPod;
  document.querySelectorAll(".rateBtn").forEach(function(b){b.onclick=function(){S.podRate=parseFloat(b.dataset.r);if(S.podPlaying){speechSynthesis.cancel();S.podPlaying=false}render()}});
  var pt=document.getElementById("podToggle");if(pt)pt.onclick=function(){S.podShow=!S.podShow;render()};
  var mlb=document.getElementById("myLibBtn");if(mlb)mlb.onclick=function(){S.showSaved=true;S.savedSearch="";render()};
  var stb=document.getElementById("saveTalkBtn");if(stb)stb.onclick=saveCurrentTalk;
  var ptb=document.getElementById("pdfTalkBtn");if(ptb)ptb.onclick=exportTalkPDF;
  var jtb=document.getElementById("jsonTalkBtn");if(jtb)jtb.onclick=function(){exportTalkJSON(null)};
}

// ═══════════ INIT ═══════════
render();
</script>
</body>
</html>
